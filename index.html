<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>复古收音机 · 旋钮调频 | Minecraft 风格</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            background: #c7b9a2;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Segoe UI', 'Courier New', monospace;
        }

        /* 收音机主体 */
        .radio {
            max-width: 560px;
            width: 100%;
            background: radial-gradient(ellipse at 30% 40%, #e0c8a8, #b87c4f);
            border-radius: 48px 48px 56px 56px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.4), inset 0 1px 4px rgba(255,255,200,0.7);
            padding: 22px 20px 30px;
            border: 1px solid #efd7b5;
            transition: all 0.2s;
            position: relative;
        }
        .radio.power-off {
            opacity: 0.7;
            filter: grayscale(0.2);
        }
        .radio.power-off .knob,
        .radio.power-off .radio-btn {
            opacity: 0.5;
            pointer-events: none;
        }

        /* 扬声器网罩 */
        .speaker-grille {
            background: #2e241f;
            border-radius: 60px;
            padding: 10px 15px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 0 2px #5e3e2a, 0 6px 12px rgba(0,0,0,0.3);
        }
        .grille-pattern {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 5px;
        }
        .grille-pattern span {
            display: inline-block;
            width: 6px;
            height: 6px;
            background: #4a3428;
            border-radius: 50%;
            margin: 2px;
            box-shadow: 0 0 0 1px #7e5e48;
        }

        /* 刻度盘 */
        .dial-section {
            background: #fdf6e3;
            border-radius: 80px;
            margin: 5px 0 15px;
            padding: 15px 15px 10px;
            box-shadow: inset 0 0 0 2px #f9eeca, inset 0 0 0 6px #d8c29a, 0 6px 12px rgba(0,0,0,0.3);
            position: relative;
        }
        .dial-top {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            font-weight: bold;
            color: #5c3b1c;
            padding: 0 12px;
        }
        .frequency-badge {
            font-family: monospace;
            background: #2c2418;
            color: #facc6f;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 12px;
        }
        .dial-scale {
            position: relative;
            margin: 20px 0 12px;
            background: #f2e5cd;
            height: 52px;
            border-radius: 40px;
            overflow: hidden;
            border: 1px solid #b68654;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
        }
        .scale-lines {
            display: flex;
            justify-content: space-between;
            padding: 0 16px;
            font-size: 12px;
            font-weight: bold;
            color: #5a3c1c;
            margin-top: 4px;
        }
        .pointer {
            position: absolute;
            bottom: -8px;
            width: 16px;
            height: 32px;
            background: #cc3b1e;
            left: 50%;
            transform: translateX(-50%);
            clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3));
            transition: left 0.2s ease-out;
            z-index: 5;
        }
        .current-freq {
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            font-family: monospace;
            background: #2b211b;
            color: #ffbe5e;
            display: inline-block;
            padding: 4px 16px;
            border-radius: 40px;
            letter-spacing: 2px;
            margin: 5px auto 0;
            width: fit-content;
            box-shadow: inset 0 0 6px #00000055, 0 2px 3px rgba(0,0,0,0.2);
        }

        /* 控制区域 */
        .controls-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-top: 12px;
        }
        .knob-block {
            flex: 1;
            text-align: center;
            background: #cea56b;
            border-radius: 50px;
            padding: 12px 4px;
            box-shadow: inset 0 1px 3px #ffefb5, 0 5px 10px rgba(0,0,0,0.3);
        }
        .knob {
            width: 70px;
            height: 70px;
            background: radial-gradient(circle at 35% 35%, #ece3cf, #b47c44);
            border-radius: 50%;
            margin: 0 auto 6px;
            box-shadow: 0 8px 12px rgba(0,0,0,0.3), inset 0 1px 3px white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.05s linear;
            color: #3b2a1a;
            border: 1px solid #eecf8b;
        }
        .knob:active { transform: scale(0.96); }
        .knob-label {
            font-size: 12px;
            font-weight: bold;
            background: #7e5c38cc;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
            color: #f9eec1;
            backdrop-filter: blur(2px);
        }

        /* 按钮区 */
        .middle-buttons {
            display: flex;
            gap: 18px;
            background: #8f5f3ad9;
            padding: 8px 16px;
            border-radius: 80px;
            backdrop-filter: blur(2px);
        }
        .radio-btn {
            background: #2d241c;
            border: none;
            color: #fad38f;
            font-size: 28px;
            width: 62px;
            padding: 8px 0;
            border-radius: 60px;
            box-shadow: 0 4px 0 #3f2c1b, inset 0 1px 0 #ac8f66;
            cursor: pointer;
            transition: 0.03s linear;
            font-weight: bold;
        }
        .radio-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #3f2c1b; }
        .power-btn {
            background: #1f3a2c;
            color: #7affb9;
            font-size: 20px;
            width: 55px;
        }
        .play-btn { background: #b3541c; color: white; box-shadow: 0 4px 0 #682f0a; width: 70px; font-size: 32px; }

        .volume-bar-wrapper {
            background: #302419;
            border-radius: 30px;
            padding: 8px 14px;
            margin-top: 18px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .vol-icon { font-size: 20px; color: #ffdfaa; }
        input[type="range"] {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            background: #d9bc8a;
            border-radius: 5px;
        }
        input[type="range"]:focus { outline: none; }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            background: #f0cd92;
            border-radius: 50%;
            border: 1px solid #7f531f;
            box-shadow: 0 2px 6px black;
            cursor: pointer;
        }

        .status-led {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            gap: 12px;
            font-size: 10px;
            color: #ffe0aa;
            align-items: center;
        }
        .led {
            width: 10px;
            height: 10px;
            background: #5a3a28;
            border-radius: 50%;
            transition: box-shadow 0.1s;
        }
        .led.on { background: #ff5e2e; box-shadow: 0 0 6px #ff4411; }
        footer {
            text-align: center;
            font-size: 9px;
            color: #efe1be;
            margin-top: 15px;
        }
        @media (max-width: 500px) {
            .knob { width: 60px; height: 60px; font-size: 22px; }
            .radio-btn { width: 52px; font-size: 24px; }
        }
    </style>
</head>
<body>
<div class="radio" id="radioBox">
    <!-- 喇叭网 -->
    <div class="speaker-grille"><div class="grille-pattern" id="grille"></div></div>

    <!-- 刻度盘 -->
    <div class="dial-section">
        <div class="dial-top"><span>📻 FM / AM</span><span class="frequency-badge" id="bandLabel">FM · 88-108</span></div>
        <div class="dial-scale" id="dialScale"><div class="pointer" id="pointer"></div></div>
        <div class="scale-lines"><span>87</span><span>92</span><span>96</span><span>100</span><span>104</span><span>108</span></div>
        <div class="current-freq" id="currentFreqDisplay">88.5 MHz</div>
    </div>

    <!-- 控制区 -->
    <div class="controls-panel">
        <div class="knob-block"><div class="knob" id="volumeKnob">🔊</div><div class="knob-label">VOLUME</div></div>
        <div class="middle-buttons">
            <button class="radio-btn" id="prevChanBtn">◀◀</button>
            <button class="radio-btn play-btn" id="playPauseBtn">▶</button>
            <button class="radio-btn power-btn" id="powerBtn">⏻</button>
        </div>
        <div class="knob-block"><div class="knob" id="tuningKnob">🎚️</div><div class="knob-label">TUNING</div></div>
    </div>

    <!-- 音量条 -->
    <div class="volume-bar-wrapper"><span class="vol-icon">🔊</span><input type="range" id="volumeSlider" min="0" max="100" value="70"></div>

    <div class="status-led"><div class="led" id="powerLed"></div><span id="stationName">柔和 FM · 经典频道</span></div>
    <footer>复古拟物 · 旋钮调频 | 电源键开关机 | MC 风格氛围</footer>
</div>

<script>
    (function(){
        // ---------- 电台预设 ----------
        const stations = [
            { name: "🎵 爵士之夜",      freq: 88.5, type: "jazz" },
            { name: "🌊 海浪轻语",      freq: 92.7, type: "ocean" },
            { name: "🌧️ 雨中日落",      freq: 96.3, type: "rain" },
            { name: "🌲 森林民谣",      freq: 101.2, type: "forest" },
            { name: "🧱 红石工厂",      freq: 105.8, type: "minecraft" }
        ];
        
        let currentStationIdx = 2;
        let isPlaying = false;
        let isPowerOn = true;          // 电源状态
        let audioCtx = null;
        let currentSource = null;
        let currentGain = null;
        let currentBGM = null;         // Minecraft 风格音乐源
        let currentVolume = 0.7;
        
        // DOM 元素
        const radioBox = document.getElementById('radioBox');
        const powerLed = document.getElementById('powerLed');
        const powerBtn = document.getElementById('powerBtn');
        const freqDisplaySpan = document.getElementById('currentFreqDisplay');
        const stationNameSpan = document.getElementById('stationName');
        const pointer = document.getElementById('pointer');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const prevChanBtn = document.getElementById('prevChanBtn');
        const nextChanBtn = document.getElementById('nextChanBtn');
        const volumeSlider = document.getElementById('volumeSlider');
        const volumeKnob = document.getElementById('volumeKnob');
        const tuningKnob = document.getElementById('tuningKnob');

        // 辅助函数：播放短促音效 (旋钮/开关机)
        function playBeep(frequency = 880, duration = 0.08, volume = 0.2) {
            if (!audioCtx || !isPowerOn) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = frequency;
            gain.gain.value = volume;
            gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(now + duration);
        }

        // 播放旋转音效 (模拟机械齿轮声)
        function playKnobClick() {
            if (!audioCtx || !isPowerOn) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = 620;
            gain.gain.value = 0.12;
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(now + 0.05);
        }

        function freqToPercent(freq) { return ((freq - 87) / (108 - 87)) * 100; }
        function updateUIForStation(index) {
            const st = stations[index];
            freqDisplaySpan.innerText = st.freq.toFixed(1) + " MHz";
            stationNameSpan.innerText = st.name;
            let pos = freqToPercent(st.freq);
            pointer.style.left = `calc(${Math.min(94, Math.max(6, pos))}% - 8px)`;
        }

        // ========== 声音引擎 ==========
        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            currentGain = audioCtx.createGain();
            currentGain.gain.value = currentVolume;
            currentGain.connect(audioCtx.destination);
        }

        function stopCurrentSound() {
            if (currentSource) {
                try { currentSource.stop(); } catch(e) {}
                if (currentSource.disconnect) currentSource.disconnect();
                currentSource = null;
            }
            if (currentBGM) {
                try { currentBGM.stop(); } catch(e) {}
                currentBGM = null;
            }
        }

        // 播放 MC 风格背景音乐 (使用 Pixabay 免版税资源)
        function playMinecraftMusic() {
            if (!audioCtx || !isPowerOn || !isPlaying) return;
            // 使用免费可商用的游戏配乐 (MC 风格)
            fetch('https://pixabay.com/music/download/game-game-gaming-minecraft-music-485382.mp3?filename=game-game-gaming-minecraft-music-485382.mp3')
                .then(response => response.arrayBuffer())
                .then(buffer => audioCtx.decodeAudioData(buffer))
                .then(decoded => {
                    if (!isPlaying || !isPowerOn) return;
                    const source = audioCtx.createBufferSource();
                    source.buffer = decoded;
                    source.loop = true;
                    const bgmGain = audioCtx.createGain();
                    bgmGain.gain.value = currentVolume * 0.55;
                    source.connect(bgmGain);
                    bgmGain.connect(audioCtx.destination);
                    source.start();
                    currentBGM = source;
                })
                .catch(e => console.warn("BGM load error, fallback to synth", e));
        }

        function startStationSound(stationType) {
            if (!audioCtx || !currentGain || !isPowerOn || !isPlaying) return;
            stopCurrentSound();
            
            if (stationType === 'minecraft') {
                playMinecraftMusic();
                return;
            }

            let sourceNode = null;
            let filterNode = null;
            if (stationType === 'jazz') {
                const osc1 = audioCtx.createOscillator();
                const osc2 = audioCtx.createOscillator();
                osc1.type = 'sine'; osc2.type = 'sine';
                osc1.frequency.value = 196.0; osc2.frequency.value = 261.6;
                const gainMix = audioCtx.createGain();
                gainMix.gain.value = 0.2;
                osc1.connect(gainMix); osc2.connect(gainMix);
                sourceNode = gainMix;
                filterNode = audioCtx.createBiquadFilter();
                filterNode.type = 'lowpass'; filterNode.frequency.value = 2000;
                osc1.start(); osc2.start();
            } else if (stationType === 'ocean') {
                const noiseNode = audioCtx.createScriptProcessor(4096, 1, 1);
                noiseNode.onaudioprocess = (e) => {
                    const out = e.outputBuffer.getChannelData(0);
                    for (let i = 0; i < 4096; i++) {
                        let rnd = (Math.random() - 0.5) * 0.25;
                        let wave = Math.sin(Date.now() * 0.0015) * 0.08;
                        out[i] = (rnd + wave) * 0.55;
                    }
                };
                sourceNode = noiseNode;
                filterNode = audioCtx.createBiquadFilter();
                filterNode.type = 'lowpass'; filterNode.frequency.value = 900;
            } else if (stationType === 'rain') {
                const pinkNode = audioCtx.createScriptProcessor(4096, 1, 1);
                let b0=0,b1=0,b2=0;
                pinkNode.onaudioprocess = (e) => {
                    const out = e.outputBuffer.getChannelData(0);
                    for (let i=0; i<4096; i++) {
                        const white = Math.random() * 2 - 1;
                        b0 = 0.99886 * b0 + white * 0.0555179;
                        b1 = 0.99332 * b1 + white * 0.0750759;
                        b2 = 0.96900 * b2 + white * 0.1538520;
                        out[i] = (b0 + b1 + b2 + white * 0.33333) * 0.3;
                    }
                };
                sourceNode = pinkNode;
                filterNode = audioCtx.createBiquadFilter();
                filterNode.type = 'lowpass'; filterNode.frequency.value = 1800;
            } else {
                const noiseNode = audioCtx.createScriptProcessor(2048, 1, 1);
                noiseNode.onaudioprocess = (e) => {
                    const out = e.outputBuffer.getChannelData(0);
                    for (let i=0;i<2048;i++) out[i] = (Math.random() - 0.5) * 0.45;
                };
                sourceNode = noiseNode;
                filterNode = audioCtx.createBiquadFilter();
                filterNode.type = 'highpass'; filterNode.frequency.value = 1200;
            }
            
            if (sourceNode && filterNode) {
                sourceNode.connect(filterNode);
                filterNode.connect(currentGain);
            } else if (sourceNode) sourceNode.connect(currentGain);
            currentSource = sourceNode;
        }

        function resumePlayback() {
            if (!audioCtx) initAudio();
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume().then(() => { if (isPlaying && isPowerOn) startStationSound(stations[currentStationIdx].type); });
            else if (isPlaying && isPowerOn) startStationSound(stations[currentStationIdx].type);
        }

        function powerOn() {
            if (isPowerOn) return;
            isPowerOn = true;
            radioBox.classList.remove('power-off');
            powerLed.classList.add('on');
            playBeep(660, 0.2, 0.25);
            if (isPlaying) startStationSound(stations[currentStationIdx].type);
        }
        function powerOff() {
            if (!isPowerOn) return;
            isPowerOn = false;
            radioBox.classList.add('power-off');
            powerLed.classList.remove('on');
            playBeep(440, 0.25, 0.25);
            stopCurrentSound();
        }
        function togglePower() { isPowerOn ? powerOff() : powerOn(); }

        function startPlay() {
            if (!isPowerOn) { powerOn(); setTimeout(() => startPlay(), 100); return; }
            if (!isPlaying) {
                isPlaying = true;
                playPauseBtn.innerHTML = '⏸';
                startStationSound(stations[currentStationIdx].type);
                if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
                playBeep(880, 0.08, 0.15);
            }
        }
        function pauseSound() {
            if (isPlaying) {
                isPlaying = false;
                playPauseBtn.innerHTML = '▶';
                stopCurrentSound();
                playBeep(660, 0.08, 0.15);
            }
        }
        function togglePlay() { isPlaying ? pauseSound() : startPlay(); }

        function setChannel(index) {
            if (!isPowerOn) return;
            index = Math.min(stations.length-1, Math.max(0, index));
            if (index === currentStationIdx && isPlaying) return;
            currentStationIdx = index;
            updateUIForStation(currentStationIdx);
            playKnobClick();
            if (isPlaying) startStationSound(stations[currentStationIdx].type);
            if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(12);
        }
        function nextChannel() { setChannel(currentStationIdx + 1); }
        function prevChannel() { setChannel(currentStationIdx - 1); }

        function setVolume(val) {
            let vol = Math.min(1, Math.max(0, parseFloat(val)));
            currentVolume = vol;
            if (currentGain) currentGain.gain.value = vol;
            volumeSlider.value = vol * 100;
        }

        // 旋钮交互
        function attachKnob(knobEl, isVolume) {
            let active = false;
            const startRotate = (e) => {
                if (!isPowerOn) return;
                e.preventDefault();
                active = true;
                const rect = knobEl.getBoundingClientRect();
                const centerX = rect.left + rect.width/2;
                const centerY = rect.top + rect.height/2;
                let startVal = isVolume ? currentVolume : stations[currentStationIdx].freq;
                let startAngle = 0;
                const getAngle = (clientX, clientY) => Math.atan2(clientY - centerY, clientX - centerX);
                const onMove = (moveE) => {
                    if (!active) return;
                    let clientX, clientY;
                    if (moveE.touches) { clientX = moveE.touches[0].clientX; clientY = moveE.touches[0].clientY; }
                    else { clientX = moveE.clientX; clientY = moveE.clientY; }
                    let delta = getAngle(clientX, clientY) - startAngle;
                    let deltaNorm = delta / (Math.PI * 2) * 3.2;
                    if (isVolume) {
                        let newVol = Math.min(1, Math.max(0, startVal + deltaNorm * 0.8));
                        setVolume(newVol);
                    } else {
                        let newFreq = Math.min(108, Math.max(87, startVal + deltaNorm * 12));
                        let nearest = stations.reduce((a,b) => Math.abs(b.freq - newFreq) < Math.abs(a.freq - newFreq) ? b : a);
                        if (Math.abs(nearest.freq - newFreq) < 1.2) setChannel(stations.indexOf(nearest));
                        else {
                            freqDisplaySpan.innerText = newFreq.toFixed(1) + " MHz";
                            let pos = freqToPercent(newFreq);
                            pointer.style.left = `calc(${Math.min(94, Math.max(6, pos))}% - 8px)`;
                        }
                        playKnobClick();
                    }
                };
                const onEnd = () => { active = false; window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onEnd); window.removeEventListener('touchmove', onMove); window.removeEventListener('touchend', onEnd); };
                startAngle = getAngle(e.clientX ?? e.touches[0].clientX, e.clientY ?? e.touches[0].clientY);
                window.addEventListener('mousemove', onMove); window.addEventListener('mouseup', onEnd);
                window.addEventListener('touchmove', onMove, { passive: false }); window.addEventListener('touchend', onEnd);
            };
            knobEl.addEventListener('mousedown', startRotate);
            knobEl.addEventListener('touchstart', startRotate, { passive: false });
        }

        // 初始化UI & 网格
        function buildGrille() {
            const container = document.getElementById('grille');
            if (!container) return;
            container.innerHTML = '';
            for (let i=0;i<220;i++) { let dot = document.createElement('span'); container.appendChild(dot); }
        }
        buildGrille();
        updateUIForStation(currentStationIdx);
        setVolume(0.7);
        
        // 事件绑定
        powerBtn.addEventListener('click', togglePower);
        playPauseBtn.addEventListener('click', togglePlay);
        prevChanBtn.addEventListener('click', prevChannel);
        nextChanBtn.addEventListener('click', nextChannel);
        volumeSlider.addEventListener('input', (e) => setVolume(e.target.value / 100));
        attachKnob(volumeKnob, true);
        attachKnob(tuningKnob, false);
        
        function activateAudio() {
            if (!audioCtx) initAudio();
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            document.body.removeEventListener('touchstart', activateAudio);
            document.body.removeEventListener('click', activateAudio);
        }
        document.body.addEventListener('touchstart', activateAudio);
        document.body.addEventListener('click', activateAudio);
        
        powerLed.classList.remove('on');
        radioBox.classList.add('power-off');
        isPowerOn = false;
    })();
</script>
</body>
  </html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>线稿收音机 · 黑白轮廓</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', 'Segoe UI', monospace;
            padding: 12px;
        }

        /* 收音机主体 — 纯黑白边框勾勒 */
        .radio {
            max-width: 420px;
            width: 100%;
            background: white;
            border: 3px solid black;
            border-radius: 32px;
            padding: 20px 18px 24px;
            box-shadow: none;
            transition: none;
        }

        /* 电源关闭时变淡 */
        .radio.power-off {
            opacity: 0.5;
        }
        .radio.power-off .knob,
        .radio.power-off .radio-btn {
            pointer-events: none;
        }

        /* 喇叭网 — 网格点阵 */
        .speaker-grille {
            border: 2px solid black;
            border-radius: 40px;
            padding: 12px 10px;
            margin-bottom: 20px;
        }
        .grille-pattern {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 4px;
        }
        .grille-pattern span {
            display: inline-block;
            width: 5px;
            height: 5px;
            background: black;
            border-radius: 50%;
        }

        /* 刻度盘区域 */
        .dial-section {
            border: 2px solid black;
            border-radius: 50px;
            padding: 14px 12px 10px;
            margin-bottom: 18px;
        }
        .dial-top {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            font-weight: bold;
            border-bottom: 1px solid black;
            padding-bottom: 6px;
            margin-bottom: 12px;
        }
        .frequency-badge {
            font-family: monospace;
            border: 1px solid black;
            padding: 2px 8px;
            border-radius: 20px;
        }
        .dial-scale {
            position: relative;
            margin: 12px 0 8px;
            background: white;
            border-top: 1px solid black;
            border-bottom: 1px solid black;
            height: 48px;
        }
        .scale-lines {
            display: flex;
            justify-content: space-between;
            padding: 0 8px;
            font-size: 10px;
            font-weight: bold;
            margin-top: 4px;
        }
        .pointer {
            position: absolute;
            bottom: -8px;
            width: 14px;
            height: 28px;
            background: black;
            left: 50%;
            transform: translateX(-50%);
            clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
            transition: left 0.2s ease-out;
        }
        .current-freq {
            text-align: center;
            font-size: 26px;
            font-weight: bold;
            font-family: monospace;
            border: 1px solid black;
            display: inline-block;
            padding: 4px 16px;
            border-radius: 40px;
            margin: 8px auto 0;
            width: fit-content;
            background: white;
            letter-spacing: 2px;
        }

        /* 控制区域 — 纯线稿旋钮+按钮 */
        .controls-panel {
            display: flex;
            flex-wrap: nowrap;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
        }
        .knob-block {
            text-align: center;
            flex: 1;
            border: 1px solid black;
            border-radius: 36px;
            padding: 8px 4px;
        }
        .knob {
            width: 64px;
            height: 64px;
            border: 2px solid black;
            border-radius: 50%;
            margin: 0 auto 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            background: white;
            transition: 0.05s linear;
        }
        .knob:active {
            transform: scale(0.96);
            background: #eee;
        }
        .knob-label {
            font-size: 10px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .middle-buttons {
            display: flex;
            gap: 12px;
            background: white;
            padding: 6px 12px;
            border-radius: 60px;
            border: 1px solid black;
        }
        .radio-btn {
            background: white;
            border: 1px solid black;
            font-size: 22px;
            width: 52px;
            padding: 6px 0;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.05s linear;
        }
        .radio-btn:active {
            background: #ccc;
            transform: scale(0.96);
        }
        .power-btn {
            background: white;
            width: 52px;
        }

        /* 音量条 */
        .volume-bar-wrapper {
            border: 1px solid black;
            border-radius: 40px;
            padding: 8px 12px;
            margin: 10px 0 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .vol-icon {
            font-size: 18px;
        }
        input[type="range"] {
            flex: 1;
            height: 2px;
            -webkit-appearance: none;
            background: black;
            border-radius: 2px;
        }
        input[type="range"]:focus {
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: white;
            border: 2px solid black;
            border-radius: 50%;
            cursor: pointer;
        }

        .status-led {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 10px;
            border-top: 1px solid black;
            padding-top: 12px;
            margin-top: 4px;
        }
        .led {
            width: 12px;
            height: 12px;
            border: 1px solid black;
            border-radius: 50%;
            background: white;
        }
        .led.on {
            background: black;
        }
        footer {
            text-align: center;
            font-size: 8px;
            margin-top: 12px;
            border-top: 1px solid black;
            padding-top: 8px;
        }
    </style>
</head>
<body>
<div class="radio" id="radioBox">
    <!-- 喇叭网 -->
    <div class="speaker-grille"><div class="grille-pattern" id="grille"></div></div>

    <!-- 刻度盘 -->
    <div class="dial-section">
        <div class="dial-top"><span>📻 FM / AM</span><span class="frequency-badge">FM · 88-108</span></div>
        <div class="dial-scale"><div class="pointer" id="pointer"></div></div>
        <div class="scale-lines"><span>87</span><span>92</span><span>96</span><span>100</span><span>104</span><span>108</span></div>
        <div class="current-freq" id="currentFreqDisplay">88.5 MHz</div>
    </div>

    <!-- 控制区 -->
    <div class="controls-panel">
        <div class="knob-block"><div class="knob" id="volumeKnob">🔊</div><div class="knob-label">VOLUME</div></div>
        <div class="middle-buttons">
            <button class="radio-btn" id="prevChanBtn">◀◀</button>
            <button class="radio-btn" id="playPauseBtn">▶</button>
            <button class="radio-btn power-btn" id="powerBtn">⏻</button>
        </div>
        <div class="knob-block"><div class="knob" id="tuningKnob">🎚️</div><div class="knob-label">TUNING</div></div>
    </div>

    <div class="volume-bar-wrapper"><span class="vol-icon">🔊</span><input type="range" id="volumeSlider" min="0" max="100" value="70"></div>

    <div class="status-led"><div class="led" id="powerLed"></div><span id="stationName">柔和 FM · 经典频道</span></div>
    <footer>黑白线稿 · 旋钮调频 | 纯合成音效</footer>
</div>

<script>
    (function(){
        // 电台预设
        const stations = [
            { name: "🎵 爵士之夜",      freq: 88.5, type: "jazz" },
            { name: "🌊 海浪轻语",      freq: 92.7, type: "ocean" },
            { name: "🌧️ 雨中日落",      freq: 96.3, type: "rain" },
            { name: "🌲 森林民谣",      freq: 101.2, type: "forest" },
            { name: "🧱 静谧矿洞",      freq: 105.8, type: "cave" }
        ];
        
        let currentStationIdx = 2;
        let isPlaying = false;
        let isPowerOn = true;
        let audioCtx = null;
        let currentSource = null;
        let currentGain = null;
        let currentVolume = 0.7;
        
        // DOM
        const radioBox = document.getElementById('radioBox');
        const powerLed = document.getElementById('powerLed');
        const powerBtn = document.getElementById('powerBtn');
        const freqDisplay = document.getElementById('currentFreqDisplay');
        const stationNameSpan = document.getElementById('stationName');
        const pointer = document.getElementById('pointer');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const prevChanBtn = document.getElementById('prevChanBtn');
        const nextChanBtn = document.getElementById('nextChanBtn');
        const volumeSlider = document.getElementById('volumeSlider');
        const volumeKnob = document.getElementById('volumeKnob');
        const tuningKnob = document.getElementById('tuningKnob');

        // 辅助: 频率转百分比
        function freqToPercent(freq) { return ((freq - 87) / 21) * 100; }

        function updateUIForStation(idx) {
            const st = stations[idx];
            freqDisplay.innerText = st.freq.toFixed(1) + " MHz";
            stationNameSpan.innerText = st.name;
            let pos = freqToPercent(st.freq);
            pointer.style.left = `calc(${Math.min(94, Math.max(6, pos))}% - 7px)`;
        }

        // 播放简短咔哒声 (模拟旋钮反馈)
        function playClick(freq = 800, dur = 0.05, vol = 0.12) {
            if (!audioCtx || !isPowerOn) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = freq;
            gain.gain.value = vol;
            gain.gain.exponentialRampToValueAtTime(0.0001, now + dur);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(now + dur);
        }

        // ========== 纯合成音引擎 (完全不依赖外部网络) ==========
        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            currentGain = audioCtx.createGain();
            currentGain.gain.value = currentVolume;
            currentGain.connect(audioCtx.destination);
        }

        function stopCurrentSound() {
            if (currentSource) {
                try { currentSource.stop(); } catch(e) {}
                if (currentSource.disconnect) currentSource.disconnect();
                currentSource = null;
            }
        }

        function startStationSound(type) {
            if (!audioCtx || !currentGain || !isPowerOn || !isPlaying) return;
            stopCurrentSound();
            
            let sourceNode = null;
            let filterNode = null;
            const now = audioCtx.currentTime;

            if (type === 'jazz') {
                const osc1 = audioCtx.createOscillator();
                const osc2 = audioCtx.createOscillator();
                osc1.type = 'sine'; osc2.type = 'sine';
                osc1.frequency.value = 196.0; osc2.frequency.value = 261.6;
                const gainMix = audioCtx.createGain();
                gainMix.gain.value = 0.18;
                osc1.connect(gainMix); osc2.connect(gainMix);
                sourceNode = gainMix;
                filterNode = audioCtx.createBiquadFilter();
                filterNode.type = 'lowpass'; filterNode.frequency.value = 2000;
                osc1.start(); osc2.start();
            } else if (type === 'ocean') {
                const noiseNode = audioCtx.createScriptProcessor(4096, 1, 1);
                noiseNode.onaudioprocess = (e) => {
                    const out = e.outputBuffer.getChannelData(0);
                    for (let i=0;i<4096;i++) {
                        let rnd = (Math.random() - 0.5) * 0.28;
                        let wave = Math.sin(Date.now() * 0.0012) * 0.06;
                        out[i] = (rnd + wave) * 0.5;
                    }
                };
                sourceNode = noiseNode;
                filterNode = audioCtx.createBiquadFilter();
                filterNode.type = 'lowpass'; filterNode.frequency.value = 850;
            } else if (type === 'rain') {
                const pinkNode = audioCtx.createScriptProcessor(4096, 1, 1);
                let b0=0,b1=0,b2=0;
                pinkNode.onaudioprocess = (e) => {
                    const out = e.outputBuffer.getChannelData(0);
                    for (let i=0;i<4096;i++) {
                        const white = Math.random() * 2 - 1;
                        b0 = 0.99886 * b0 + white * 0.0555;
                        b1 = 0.99332 * b1 + white * 0.0750;
                        b2 = 0.96900 * b2 + white * 0.1538;
                        out[i] = (b0 + b1 + b2 + white * 0.333) * 0.32;
                    }
                };
                sourceNode = pinkNode;
                filterNode = audioCtx.createBiquadFilter();
                filterNode.type = 'lowpass'; filterNode.frequency.value = 1700;
            } else if (type === 'forest') {
                const noiseNode = audioCtx.createScriptProcessor(2048, 1, 1);
                noiseNode.onaudioprocess = (e) => {
                    const out = e.outputBuffer.getChannelData(0);
                    for (let i=0;i<2048;i++) out[i] = (Math.random() - 0.5) * 0.42;
                };
                sourceNode = noiseNode;
                filterNode = audioCtx.createBiquadFilter();
                filterNode.type = 'highpass'; filterNode.frequency.value = 1100;
            } else {
                // cave: 低频嗡鸣 + 轻微噼啪
                const oscLow = audioCtx.createOscillator();
                oscLow.type = 'sine';
                oscLow.frequency.value = 88;
                const gainLow = audioCtx.createGain();
                gainLow.gain.value = 0.12;
                oscLow.connect(gainLow);
                sourceNode = gainLow;
                filterNode = audioCtx.createBiquadFilter();
                filterNode.type = 'lowpass'; filterNode.frequency.value = 400;
                oscLow.start();
            }
            
            if (sourceNode && filterNode) {
                sourceNode.connect(filterNode);
                filterNode.connect(currentGain);
            } else if (sourceNode) sourceNode.connect(currentGain);
            currentSource = sourceNode;
        }

        function resumePlayback() {
            if (!audioCtx) initAudio();
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') {
                audioCtx.resume().then(() => { if (isPlaying && isPowerOn) startStationSound(stations[currentStationIdx].type); });
            } else {
                if (isPlaying && isPowerOn) startStationSound(stations[currentStationIdx].type);
            }
        }

        // 电源控制
        function powerOn() {
            if (isPowerOn) return;
            isPowerOn = true;
            radioBox.classList.remove('power-off');
            powerLed.classList.add('on');
            playClick(660, 0.15, 0.2);
            if (isPlaying) startStationSound(stations[currentStationIdx].type);
        }
        function powerOff() {
            if (!isPowerOn) return;
            isPowerOn = false;
            radioBox.classList.add('power-off');
            powerLed.classList.remove('on');
            playClick(440, 0.18, 0.2);
            stopCurrentSound();
        }
        function togglePower() { isPowerOn ? powerOff() : powerOn(); }

        function startPlay() {
            if (!isPowerOn) { powerOn(); setTimeout(() => startPlay(), 100); return; }
            if (!isPlaying) {
                isPlaying = true;
                playPauseBtn.innerHTML = '⏸';
                startStationSound(stations[currentStationIdx].type);
                if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
                playClick(880, 0.07, 0.12);
            }
        }
        function pauseSound() {
            if (isPlaying) {
                isPlaying = false;
                playPauseBtn.innerHTML = '▶';
                stopCurrentSound();
                playClick(660, 0.07, 0.12);
            }
        }
        function togglePlay() { isPlaying ? pauseSound() : startPlay(); }

        function setChannel(idx) {
            if (!isPowerOn) return;
            idx = Math.min(stations.length-1, Math.max(0, idx));
            if (idx === currentStationIdx && isPlaying) return;
            currentStationIdx = idx;
            updateUIForStation(currentStationIdx);
            playClick(720, 0.05, 0.1);
            if (isPlaying) startStationSound(stations[currentStationIdx].type);
            if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(10);
        }
        function nextChannel() { setChannel(currentStationIdx + 1); }
        function prevChannel() { setChannel(currentStationIdx - 1); }

        function setVolume(val) {
            let vol = Math.min(1, Math.max(0, parseFloat(val)));
            currentVolume = vol;
            if (currentGain) currentGain.gain.value = vol;
            volumeSlider.value = vol * 100;
        }

        // 旋钮交互 (简化, 轻触加减)
        let tuningStep = 0;
        volumeKnob.addEventListener('click', () => { if(isPowerOn){ let newVol = Math.min(1, currentVolume + 0.05); setVolume(newVol); playClick(600,0.03,0.08); } });
        volumeKnob.addEventListener('contextmenu', (e) => { e.preventDefault(); if(isPowerOn){ let newVol = Math.max(0, currentVolume - 0.05); setVolume(newVol); playClick(400,0.03,0.08); } });
        tuningKnob.addEventListener('click', () => { if(isPowerOn){ let next = (currentStationIdx + 1) % stations.length; setChannel(next); } });
        tuningKnob.addEventListener('contextmenu', (e) => { e.preventDefault(); if(isPowerOn){ let prev = (currentStationIdx - 1 + stations.length) % stations.length; setChannel(prev); } });

        // 音量条
        volumeSlider.addEventListener('input', (e) => setVolume(e.target.value / 100));

        // 按钮事件
        powerBtn.addEventListener('click', togglePower);
        playPauseBtn.addEventListener('click', togglePlay);
        prevChanBtn.addEventListener('click', prevChannel);
        nextChanBtn.addEventListener('click', nextChannel);

        // 生成喇叭网格
        const grilleContainer = document.getElementById('grille');
        if (grilleContainer) {
            for (let i=0; i<180; i++) { let dot = document.createElement('span'); grilleContainer.appendChild(dot); }
        }

        function firstTouch() {
            if (!audioCtx) initAudio();
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            document.body.removeEventListener('touchstart', firstTouch);
            document.body.removeEventListener('click', firstTouch);
        }
        document.body.addEventListener('touchstart', firstTouch);
        document.body.addEventListener('click', firstTouch);

        updateUIForStation(currentStationIdx);
        setVolume(0.65);
        powerLed.classList.remove('on');
        radioBox.classList.add('power-off');
        isPowerOn = false;
    })();
</script>
</body>
    </html>
